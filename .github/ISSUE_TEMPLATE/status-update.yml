name: "🔧 Atualizar status de um sistema"
description: Reportar uma mudança de status de um sistema do hospital.
title: "[status] "
labels: ["status-update"]
body:
  - type: markdown
    attributes:
      value: |
        Preencha este formulário para reportar uma mudança de status.
        Assim que a Issue for enviada, uma automação já atualiza o site
        (commit direto, sem Pull Request) e fecha esta Issue confirmando
        o resultado.

  - type: dropdown
    id: sistema
    attributes:
      label: Sistema
      description: Qual sistema teve mudança de status?
      options:
        - Gerador de Energia
        - Gases Medicinais / Oxigênio
        - Rede de Dados / Internet
        - Prontuário Eletrônico (PEP)
        - Elevadores
        - Climatização — UTI e Centro Cirúrgico
        - Abastecimento de Água
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: Novo status
      description: Qual o novo status desse sistema?
      options:
        - Operante
        - Inoperante
        - Desconhecido
    validations:
      required: true

  - type: textarea
    id: observacao
    attributes:
      label: Observação (opcional)
      description: Contexto, causa provável, previsão de normalização etc.
      placeholder: "Ex.: queda de energia na subestação, previsão de retorno às 18h."
    validations:
      required: false
