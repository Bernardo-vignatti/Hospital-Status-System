name: "🔧 Atualizar status de um sistema"
description: Reportar uma mudança de status de um sistema do hospital.
title: "[status] "
labels: ["status-update"]
body:
  - type: markdown
    attributes:
      value: |
        Preencha este formulário para reportar uma mudança de status.
        A automação registra a mudança na fila e ela aparece no site no
        próximo ciclo de atualização (a cada ~5 min).

        > Apenas colaboradores autorizados do repositório conseguem
        > alterar o painel. Issues de outras pessoas são fechadas
        > automaticamente sem alterar nada.

  # ⚠️ As opções abaixo precisam bater EXATAMENTE com o campo "name" de
  # cada serviço em config/services.json. O script scripts/validate.js
  # falha o CI se elas divergirem — antes essa divergência fazia o
  # formulário falhar em silêncio para 4 dos 7 serviços.
  - type: dropdown
    id: sistema
    attributes:
      label: Sistema
      description: Qual sistema teve mudança de status?
      options:
        - Gerador de Energia
        - Gás Oxigênio
        - Site (hfatima.com.br)
        - Prontuário Eletrônico
        - Elevadores
        - Climatização
        - Abastecimento de Água
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: Novo status
      description: Qual o novo status desse sistema?
      options:
        - Operante
        - Inoperante
        - Manutenção
        - Desconhecido
    validations:
      required: true

  - type: textarea
    id: observacao
    attributes:
      label: Observação (opcional)
      description: Contexto, causa provável, previsão de normalização etc.
      placeholder: "Ex.: queda de energia na subestação, previsão de retorno às 18h."
    validations:
      required: false
