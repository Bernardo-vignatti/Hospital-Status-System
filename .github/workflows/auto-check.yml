name: Checagem automática (todos os serviços) — fallback manual

# O ciclo de ~5 min de verdade agora roda FORA do GitHub Actions: num
# Cloudflare Worker (Cron Trigger a cada 5 min, ver /cloudflare-worker),
# que lê e escreve data/status.json e data/pending-changes.json via
# GitHub Contents API. Motivo: o agendador interno do GitHub Actions
# não garante pontualidade em intervalos curtos (*/5 min) — pode atrasar
# muito ou simplesmente não disparar por um bom tempo, sem gerar erro
# algum. O Cron Trigger da Cloudflare não sofre desse problema, e roda
# 100% online (sem VPS/Raspberry Pi/servidor próprio), de graça no plano
# Free.
#
# Este workflow continua existindo só como fallback manual: se o Worker
# ficar indisponível (conta suspensa, token expirado, etc.), dá pra
# rodar "Run workflow" aqui e o site continua sendo atualizado enquanto
# isso não é resolvido. Ele faz exatamente a mesma lógica (check-http.js
# -> validate.js -> commit/push de status.json e pending-changes.json).
#
# O "concurrency.group" abaixo é o MESMO do update-status.yml de
# propósito, para as duas workflows do GitHub Actions nunca correrem em
# paralelo entre si. Isso NÃO protege contra corrida com o Worker — essa
# proteção é o retry com merge que o Worker faz via GitHub Contents API
# (ver cloudflare-worker/src/index.js).

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: auto-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/check-http.js
      - run: node scripts/validate.js
      - name: Commit se houver mudança
        run: |
          git config user.name "status-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/status.json data/pending-changes.json
          git diff --quiet --cached || git commit -m "chore: checagem automática de status (fallback manual)"
          git push
