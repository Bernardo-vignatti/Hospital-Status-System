name: Checagem automática (todos os serviços)

# Roda a cada 5 minutos (mínimo suportado pelo GitHub Actions) — é o
# ÚNICO "tick" do relógio global do sistema: o único lugar que escreve
# data/status.json e avança a timeline. Para TODOS os serviços de
# config/services.json, sem exceção, na ordem de prioridade:
#   1. Mudança manual pendente em data/pending-changes.json (registrada
#      por uma Issue via update-status.yml) -> aplica e consome da fila.
#   2. enabled=true + url -> checagem HTTP real (up/down medido de fato).
#   3. Caso contrário -> heartbeat: repete o último status conhecido,
#      mantendo o serviço em modo manual, sem deixar a barra de
#      histórico "parada no tempo".
#
# Uma Issue processada entre dois ciclos nunca cria um segmento fora de
# cadência: ela só fica na fila até este tick rodar. O "concurrency.group"
# abaixo é o mesmo do update-status.yml de propósito, para as duas
# workflows nunca correrem em paralelo (evita corrida de git/fila).
#
# O commit é feito direto: é uma atualização objetiva e automática, não
# uma decisão humana que precise de aprovação.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: auto-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/check-http.js
      - run: node scripts/validate.js
      - name: Commit se houver mudança
        run: |
          git config user.name "status-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/status.json data/pending-changes.json
          git diff --quiet --cached || git commit -m "chore: checagem automática de status"
          git push
