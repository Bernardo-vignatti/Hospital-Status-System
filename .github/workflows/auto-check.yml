name: Checagem automática (todos os serviços)

# Roda a cada 5 minutos (mínimo suportado pelo GitHub Actions) e atualiza
# TODOS os serviços de config/services.json, sem exceção:
#   - enabled=true  + url -> checagem HTTP real (up/down medido de fato)
#   - enabled=false        -> heartbeat: repete o último status conhecido,
#     mantendo o serviço em modo manual (via Issue, ver update-status.yml)
#     mas sem deixar a barra de histórico "parada no tempo".
#
# Isso substitui o antigo snapshot diário: agora o heartbeat acontece na
# mesma cadência da checagem HTTP, a cada 5 minutos, para todos.
#
# O commit é feito direto: é uma atualização objetiva e automática, não
# uma decisão humana que precise de aprovação.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: auto-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/check-http.js
      - run: node scripts/validate.js
      - name: Commit se houver mudança
        run: |
          git config user.name "status-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/status.json
          git diff --quiet --cached || git commit -m "chore: checagem automática de status"
          git push
