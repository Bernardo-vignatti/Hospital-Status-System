name: Atualizar status via Issue

# Dispara quando uma Issue é criada a partir do template
# ".github/ISSUE_TEMPLATE/status-update.yml". NÃO escreve data/status.json
# e NÃO avança a timeline diretamente — só registra a mudança desejada em
# data/pending-changes.json (fila). A timeline só avança de fato no
# próximo ciclo do auto-check.yml (~5 min), que é quem lê e aplica essa
# fila para todos os serviços ao mesmo tempo.
#
# O "concurrency.group" é o MESMO do auto-check.yml de propósito: isso
# serializa as duas workflows no GitHub Actions, garantindo que uma Issue
# processada nunca faça commit/push ao mesmo tempo que um tick do ciclo
# automático (evitando corrida de git e leitura inconsistente da fila).
# É essa serialização, junto da fila, que forma o "relógio único" do
# sistema: uma Issue pode chegar a qualquer momento, mas ela só afeta o
# que o próximo tick do ciclo vai aplicar — nunca reinicia, adianta ou
# atrasa o cronograma de 5 minutos.
#
# Commit e push diretos, sem Pull Request: a aprovação já ocorreu no
# momento em que alguém com acesso ao repositório preencheu e enviou o
# formulário.

on:
  issues:
    types:
      - opened

permissions:
  contents: write
  issues: write

concurrency:
  group: auto-check
  cancel-in-progress: false

jobs:
  update-status:
    if: github.event.issue.state == 'open'
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Registrar mudança na fila pendente
        id: apply
        run: node scripts/apply-status-change.js
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      - name: Validar (status.json + fila pendente)
        if: steps.apply.outputs.changed == 'true'
        run: node scripts/validate.js

      - name: Commit e push da fila (só se houve mudança real)
        if: steps.apply.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pending-changes.json
          if git diff --cached --quiet; then
            echo "Nenhuma alteração de fato na fila. Nada a commitar."
            exit 0
          fi
          git commit -m "chore: mudança de status via Issue (#${{ github.event.issue.number }}) — na fila para o próximo ciclo"
          git push

      - name: Comentar e fechar a Issue (sucesso)
        if: steps.apply.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const serviceName = process.env.SERVICE_NAME;
            const statusLabel = process.env.STATUS_LABEL;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Mudança de **${serviceName}** para **${statusLabel}** registrada. Ela será refletida no site no próximo ciclo de atualização automática (a cada ~5 min).`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
        env:
          SERVICE_NAME: ${{ steps.apply.outputs.service_name }}
          STATUS_LABEL: ${{ steps.apply.outputs.status_label }}

      - name: Comentar e fechar a Issue (sem mudança)
        if: steps.apply.outputs.changed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ Não consegui aplicar esta atualização automaticamente (formulário não reconhecido, ou o status já é o mesmo — inclusive considerando uma mudança pendente ainda não aplicada). Verifique o formulário ou tente novamente.',
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
