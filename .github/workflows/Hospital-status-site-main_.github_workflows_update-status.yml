name: Atualizar status via Issue

# Dispara quando uma Issue é criada a partir do template
# ".github/ISSUE_TEMPLATE/status-update.yml". Aplica a mudança em
# data/status.json e faz commit/push direto (sem Pull Request): a
# aprovação já ocorreu no momento em que alguém com acesso ao repositório
# preencheu e enviou o formulário.

on:
  issues:
    types:
      - opened

permissions:
  contents: write
  issues: write

jobs:
  update-status:
    if: github.event.issue.state == 'open' && contains(github.event.issue.labels.*.name, 'status-update')
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Aplicar mudança de status
        id: apply
        run: node scripts/apply-status-change.js
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Validar status.json
        if: steps.apply.outputs.changed == 'true'
        run: node scripts/validate.js

      - name: Commit e push (só se houve mudança real)
        if: steps.apply.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/status.json
          if git diff --cached --quiet; then
            echo "Nenhuma alteração de fato no arquivo. Nada a commitar."
            exit 0
          fi
          git commit -m "chore: atualização de status via Issue (#${{ github.event.issue.number }})"
          git push

      - name: Comentar e fechar a Issue (sucesso)
        if: steps.apply.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const serviceName = process.env.SERVICE_NAME;
            const statusLabel = process.env.STATUS_LABEL;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Status de **${serviceName}** atualizado para **${statusLabel}**. O site já reflete essa mudança.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
        env:
          SERVICE_NAME: ${{ steps.apply.outputs.service_name }}
          STATUS_LABEL: ${{ steps.apply.outputs.status_label }}

      - name: Comentar e fechar a Issue (sem mudança)
        if: steps.apply.outputs.changed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ Não consegui aplicar esta atualização automaticamente (formulário não reconhecido ou status já era o mesmo). Verifique o formulário ou atualize manualmente.',
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
