name: Validar status.json

# Além do schema, valida que o formulário de Issue continua batendo com
# config/services.json (ver scripts/validate.js) — sem isso, renomear um
# serviço faz a atualização via Issue falhar em silêncio.

on:
  pull_request:
    paths: ['data/status.json', 'config/services.json', 'data/pending-changes.json', '.github/ISSUE_TEMPLATE/status-update.yml', 'scripts/**']
  push:
    branches: [main]
    paths: ['data/status.json', 'config/services.json', 'data/pending-changes.json', '.github/ISSUE_TEMPLATE/status-update.yml', 'scripts/**']

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate.js
