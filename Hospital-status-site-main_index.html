<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status dos Sistemas — Hospital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F5F7F8; --panel: #FFFFFF; --ink: #10222B; --ink-soft: #4C6470;
    --line: #DFE6E9; --teal-deep: #0A5B63;
    --ok: #1F9D55; --ok-bg: #E7F6ED;
    --warn: #D98A1E; --warn-bg: #FCF1DE;
    --down: #D14343; --down-bg: #FBE7E7;
    --maint: #64748B;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ background:var(--bg); color:var(--ink); font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh; }
  .wrap{ max-width:720px; margin:0 auto; padding:0 20px 60px; }
  header{ padding:36px 0 24px; border-bottom:1px solid var(--line); margin-bottom:28px; }
  .eyebrow{ font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--teal-deep); margin:0 0 10px; }
  h1{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:28px; margin:0 0 4px; letter-spacing:-0.01em; }
  .sub{ color:var(--ink-soft); font-size:14px; margin:0; }
  .banner{ display:flex; align-items:center; gap:14px; padding:18px 20px; border-radius:10px; margin-bottom:28px; font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:16px; border:1px solid transparent; transition:background-color .3s ease, color .3s ease, border-color .3s ease; }
  .banner.ok{ background:var(--ok-bg); color:#146538; border-color:#BEE6CC; }
  .banner.warn{ background:var(--warn-bg); color:#8A5A0F; border-color:#F0D9AC; }
  .banner.down{ background:var(--down-bg); color:#8F2A2A; border-color:#F1BFBF; }
  .dot{ width:11px; height:11px; border-radius:50%; display:inline-block; position:relative; flex-shrink:0; }
  .dot::after{ content:''; position:absolute; inset:-5px; border-radius:50%; opacity:0.35; }
  .dot.ok{ background:var(--ok); } .dot.ok::after{ background:var(--ok); animation:pulse 2.2s ease-out infinite; }
  .dot.warn{ background:var(--warn); } .dot.warn::after{ background:var(--warn); animation:pulse 1.4s ease-out infinite; }
  .dot.down{ background:var(--down); }
  .dot.maint{ background:var(--maint); }
  @keyframes pulse{ 0%{ transform:scale(0.6); opacity:0.5; } 100%{ transform:scale(1.8); opacity:0; } }
  @media (prefers-reduced-motion: reduce){ .dot::after{ animation:none; display:none; } }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:20px; margin-bottom:14px; transition:box-shadow .4s ease, border-color .4s ease; }
  .card.flash{ border-color:var(--teal-deep); box-shadow:0 0 0 3px rgba(10,91,99,0.12); }
  .card-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .name{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:16px; margin:0 0 6px; }
  .status-label{ font-family:'IBM Plex Mono', monospace; font-size:12px; }
  .status-label.ok{ color:var(--ok); } .status-label.warn{ color:var(--warn); } .status-label.down{ color:var(--down); } .status-label.maint{ color:var(--maint); }
  .uptime{ font-family:'IBM Plex Mono', monospace; font-size:20px; font-weight:500; text-align:right; white-space:nowrap; }
  .uptime span{ font-size:12px; color:var(--ink-soft); display:block; margin-top:2px; }
  .latency{ font-family:'IBM Plex Mono', monospace; font-size:11px; color:#9AAAB1; text-align:right; margin-top:4px; }
  .history{ display:flex; gap:2.5px; margin-top:16px; height:34px; }
  .bar{ flex:1; border-radius:2px; min-width:3px; transition:background-color .3s ease; }
  .bar.ok{ background:var(--ok); } .bar.warn{ background:var(--warn); } .bar.down{ background:var(--down); } .bar.maint{ background:var(--maint); opacity:0.5; }
  .history-labels{ display:flex; justify-content:space-between; font-family:'IBM Plex Mono', monospace; font-size:10px; color:#9AAAB1; margin-top:6px; }
  .updated-at{ text-align:center; color:#9AAAB1; font-family:'IBM Plex Mono', monospace; font-size:11px; margin-top:24px; }
  .loading, .error{ text-align:center; padding:60px 0; color:var(--ink-soft); font-family:'IBM Plex Mono', monospace; font-size:13px; }
  @keyframes fadeIn{ from{ opacity:0; transform:translateY(4px); } to{ opacity:1; transform:translateY(0); } }
  .card{ animation:fadeIn .35s ease both; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">Painel de Status</p>
    <h1>Sistemas do Hospital</h1>
    <p class="sub">Acompanhamento em tempo real da infraestrutura crítica.</p>
  </header>
  <div id="banner" class="banner ok" style="display:none;">
    <svg width="28" height="20" viewBox="0 0 28 20" fill="none">
      <path d="M0 10 H6 L9 2 L13 18 L16 10 H28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span id="banner-text"></span>
  </div>
  <div id="list"><div class="loading">Carregando status dos sistemas…</div></div>
  <p class="updated-at" id="updated-at"></p>
</div>
<script>
const STATUS_META = {
  ok:    { label: 'Operacional',   cls: 'ok' },
  warn:  { label: 'Degradado',     cls: 'warn' },
  down:  { label: 'Indisponível',  cls: 'down' },
  maint: { label: 'Em manutenção', cls: 'maint' },
};

const POLL_INTERVAL_MS = 30000; // ~30s, conforme pedido
const CLOCK_INTERVAL_MS = 1000; // atualiza "há X segundos" a cada 1s, sem rede

let serviceNames = {};        // id -> name (vem de config/services.json, carregado 1x)
let lastUpdatedAt = null;      // updatedAt do último status.json aplicado
let lastServiceJson = {};      // id -> JSON.stringify(service) do último render, p/ diff
let lastUpdatedAtDate = null;  // Date do último updatedAt, para o relógio "há Xs"

function computeUptime(history){
  const weight = { ok: 1, warn: 0.5, down: 0, maint: 1 };
  const total = history.reduce((sum, h) => sum + (weight[h.status] ?? 1), 0);
  return (total / history.length * 100).toFixed(3);
}

function renderBanner(services){
  const banner = document.getElementById('banner');
  const text = document.getElementById('banner-text');
  const hasDown = services.some(s => s.status === 'down');
  const hasWarn = services.some(s => s.status === 'warn');
  banner.classList.remove('ok','warn','down');
  banner.style.display = 'flex';
  if(hasDown){ banner.classList.add('down'); text.textContent = 'Um ou mais sistemas estão indisponíveis'; }
  else if(hasWarn){ banner.classList.add('warn'); text.textContent = 'Desempenho degradado em parte dos sistemas'; }
  else { banner.classList.add('ok'); text.textContent = 'Todos os sistemas operacionais'; }
}

function cardHtml(s){
  const meta = STATUS_META[s.status] || STATUS_META.ok;
  const uptime = computeUptime(s.history);
  const bars = s.history.map(h => `<div class="bar ${(STATUS_META[h.status]||STATUS_META.ok).cls}"></div>`).join('');
  const name = serviceNames[s.id] || s.id;
  const latency = typeof s.lastResponseTime === 'number'
    ? `<div class="latency">Latência: ${s.lastResponseTime} ms</div>`
    : '';
  return `
    <div class="card-top">
      <div>
        <p class="name">${name}</p>
        <span class="status-label ${meta.cls}">
          <span class="dot ${meta.cls}" style="width:8px;height:8px;margin-right:6px;vertical-align:middle;"></span>${meta.label}
        </span>
      </div>
      <div>
        <div class="uptime">${uptime}%<span>disponibilidade (${s.history.length} dias)</span></div>
        ${latency}
      </div>
    </div>
    <div class="history">${bars}</div>
    <div class="history-labels"><span>${s.history.length} dias atrás</span><span>hoje</span></div>
  `;
}

// Renderiza a lista inteira (só usado na primeira carga).
function renderListFull(services){
  const list = document.getElementById('list');
  list.innerHTML = services.map(s => `<div class="card" data-id="${s.id}">${cardHtml(s)}</div>`).join('');
  services.forEach(s => { lastServiceJson[s.id] = JSON.stringify(s); });
}

// Atualiza apenas os cards cujo conteúdo realmente mudou, evitando
// reconstruir a interface inteira a cada polling.
function renderListDiff(services){
  const list = document.getElementById('list');
  services.forEach(s => {
    const serialized = JSON.stringify(s);
    if(lastServiceJson[s.id] === serialized) return; // nada mudou neste serviço

    let card = list.querySelector(`.card[data-id="${s.id}"]`);
    if(!card){
      card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = s.id;
      list.appendChild(card);
    }
    card.innerHTML = cardHtml(s);
    card.classList.add('flash');
    setTimeout(() => card.classList.remove('flash'), 900);

    lastServiceJson[s.id] = serialized;
  });
}

function updateClock(){
  const el = document.getElementById('updated-at');
  if(!lastUpdatedAtDate || !el) return;
  const diffSec = Math.max(0, Math.round((Date.now() - lastUpdatedAtDate.getTime()) / 1000));
  let when;
  if(diffSec < 5) when = 'agora mesmo';
  else if(diffSec < 60) when = `há ${diffSec} segundos`;
  else if(diffSec < 3600) when = `há ${Math.floor(diffSec / 60)} minuto(s)`;
  else when = 'há ' + lastUpdatedAtDate.toLocaleString('pt-BR');
  el.textContent = 'Atualizado ' + when;
}

async function loadServiceNames(){
  const res = await fetch('./config/services.json', { cache: 'no-store' });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const config = await res.json();
  config.services.forEach(s => { serviceNames[s.id] = s.name; });
}

async function pollStatus(isFirstLoad){
  try{
    const res = await fetch('./data/status.json?t=' + Date.now(), { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if(!isFirstLoad && data.updatedAt === lastUpdatedAt){
      return; // nada mudou desde a última checagem, evita re-render inútil
    }

    renderBanner(data.services);
    if(isFirstLoad){
      renderListFull(data.services);
    } else {
      renderListDiff(data.services);
    }

    lastUpdatedAt = data.updatedAt;
    lastUpdatedAtDate = new Date(data.updatedAt);
    updateClock();
  }catch(e){
    if(isFirstLoad){
      document.getElementById('list').innerHTML =
        '<div class="error">Não foi possível carregar o status agora. Tente novamente em instantes.</div>';
    }
    console.error(e);
  }
}

async function init(){
  try{
    await loadServiceNames();
  }catch(e){
    console.error('Falha ao carregar config/services.json', e);
  }
  await pollStatus(true);
  setInterval(() => pollStatus(false), POLL_INTERVAL_MS);
  setInterval(updateClock, CLOCK_INTERVAL_MS);
}

init();
</script>
</body>
</html>
