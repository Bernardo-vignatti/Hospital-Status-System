<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status dos Serviços — Hospital Fátima Flores da Cunha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F2F4F6; --panel: #FFFFFF; --ink: #10222B; --ink-soft: #55707A;
    --line: #E4EAEC; --navy: #0F1B2E; --navy-soft: #8A97A8;
    --up: #1F9D55; --up-bg: #E7F6ED;
    --down: #D14343; --down-bg: #FBE7E7;
    --maint: #DB9A2C; --maint-bg: #FCF1D6;
    --unknown: #8996A0; --unknown-bg: #EDF0F1;
    --shadow-sm: 0 1px 2px rgba(16,34,43,0.05);
    --shadow-md: 0 10px 28px -16px rgba(16,34,43,0.22), 0 2px 6px -2px rgba(16,34,43,0.06);
    --shadow-hero: 0 24px 48px -20px rgba(16,27,46,0.28), 0 4px 14px -4px rgba(16,27,46,0.10);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ background:var(--bg); color:var(--ink); font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh; }
  .wrap{ max-width:760px; margin:0 auto; padding:0 20px 72px; }
  @media (min-width: 900px){ .wrap{ max-width:820px; padding:0 24px 88px; } }

  /* ---- Top bar (escuro, com logo) ---- */
  .top-bar{ background:var(--navy); padding:36px 20px 96px; }
  .top-bar-inner{ max-width:760px; margin:0 auto; }
  @media (min-width: 900px){ .top-bar-inner{ max-width:820px; } }
  .logo-img{ height:72px; width:auto; display:block; margin-bottom:26px; }
  h1{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:30px; margin:0 0 8px; letter-spacing:-0.01em; color:#fff; }
  .sub{ color:#9FADC0; font-size:14px; margin:0; font-family:'IBM Plex Mono', monospace; }

  /* ---- Hero card (sobrepõe o top-bar) ---- */
  .hero-card{
    background:var(--panel); border-radius:18px; box-shadow:var(--shadow-hero);
    margin-top:-64px; padding:40px 24px 34px; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:20px;
    transition:box-shadow .3s ease;
  }
  .hero-icon-halo{ width:120px; height:120px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background-color .3s ease; }
  .hero-icon-halo.up{ background:var(--up-bg); } .hero-icon-halo.down{ background:var(--down-bg); }
  .hero-icon-halo.maint{ background:var(--maint-bg); } .hero-icon-halo.unknown{ background:var(--unknown-bg); }
  .hero-icon{ width:88px; height:88px; border-radius:50%; position:relative; transition:background-color .3s ease; }
  .hero-icon.up{ background:var(--up); } .hero-icon.down{ background:var(--down); }
  .hero-icon.maint{ background:var(--maint); } .hero-icon.unknown{ background:var(--unknown); }
  .hero-icon.up::after{ content:''; position:absolute; inset:-14px; border-radius:50%; background:var(--up); opacity:0.35; animation:pulse 2.2s ease-out infinite; }
  .hero-text{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:27px; margin:0; letter-spacing:-0.01em; color:var(--ink); }

  /* ---- Título de seção ---- */
  .section-title{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:25px; margin:40px 0 16px; letter-spacing:-0.01em; }

  .dot{ width:11px; height:11px; border-radius:50%; display:inline-block; position:relative; flex-shrink:0; }
  .dot::after{ content:''; position:absolute; inset:-5px; border-radius:50%; opacity:0.35; }
  .dot.up{ background:var(--up); } .dot.up::after{ background:var(--up); animation:pulse 2.2s ease-out infinite; }
  .dot.down{ background:var(--down); }
  .dot.maint{ background:var(--maint); }
  .dot.unknown{ background:var(--unknown); }
  @keyframes pulse{ 0%{ transform:scale(0.6); opacity:0.5; } 100%{ transform:scale(1.8); opacity:0; } }
  @media (prefers-reduced-motion: reduce){ .dot::after{ animation:none; display:none; } .hero-icon::after{ animation:none; display:none; } .card{ animation:none !important; } }

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:22px 22px 20px; margin-bottom:16px; box-shadow:var(--shadow-sm);
    transition:box-shadow .35s ease, border-color .35s ease, transform .35s ease;
  }
  .card.flash{ border-color:var(--navy); box-shadow:0 0 0 3px rgba(15,27,46,0.10), var(--shadow-md); }
  @keyframes fadeIn{ from{ opacity:0; transform:translateY(5px); } to{ opacity:1; transform:translateY(0); } }
  .card{ animation:fadeIn .4s ease both; }

  .card-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; }
  .name-link{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:18px; margin:0; letter-spacing:-0.005em; color:var(--ink); text-decoration:none; display:inline-flex; align-items:center; gap:7px; }
  .name-link .arrow{ color:var(--navy-soft); font-weight:500; font-size:16px; transition:transform .15s ease; }
  a.name-link:hover .arrow{ transform:translateX(2px); color:var(--ink); }

  .status-badge{ width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .status-badge.up{ background:var(--up-bg); } .status-badge.down{ background:var(--down-bg); }
  .status-badge.maint{ background:var(--maint-bg); } .status-badge.unknown{ background:var(--unknown-bg); }
  .status-badge .dot{ width:12px; height:12px; }

  .uptime{ font-family:'IBM Plex Mono', monospace; font-size:22px; font-weight:600; margin-top:10px; }
  .uptime.up{ color:var(--up); } .uptime.down{ color:var(--down); } .uptime.maint{ color:var(--maint); } .uptime.unknown{ color:var(--unknown); }
  .uptime-label{ font-size:11.5px; font-weight:400; color:var(--ink-soft); font-family:'Inter', sans-serif; margin-left:6px; }

  .history-wrap{ margin-top:16px; }
  .history{ display:flex; gap:3px; height:34px; }
  .bar{
    flex:1; border-radius:6px; min-width:4px; cursor:pointer;
    transition:background-color .3s ease, transform .15s ease;
  }
  .bar.up{ background:var(--up); } .bar.down{ background:var(--down); } .bar.maint{ background:var(--maint); } .bar.unknown{ background:var(--unknown); opacity:0.5; }
  .bar:hover, .bar.tapped{ transform:scaleY(1.1); }
  .history-caption{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:#9AAAB1; margin-top:9px; }

  #tooltip{
    position:fixed; z-index:50; pointer-events:none; background:#10222B; color:#fff;
    border-radius:8px; padding:9px 12px; font-family:'IBM Plex Mono', monospace; font-size:11.5px;
    line-height:1.5; box-shadow:0 8px 24px rgba(0,0,0,0.25); opacity:0; transform:translate(-50%,-8px);
    transition:opacity .12s ease, transform .12s ease; max-width:220px; white-space:nowrap;
  }
  #tooltip.visible{ opacity:1; transform:translate(-50%,-14px); }
  #tooltip b{ font-family:'Inter', sans-serif; font-weight:600; }

  .loading, .error{ text-align:center; padding:60px 0; color:var(--ink-soft); font-family:'IBM Plex Mono', monospace; font-size:13px; }
</style>
</head>
<body>
<div class="top-bar">
  <div class="top-bar-inner">
    <img class="logo-img" src="assets/hospital-fatima-logo.png" alt="Hospital Fátima Flores da Cunha">
    <h1>Status dos Serviços</h1>
    <p class="sub" id="sub-updated">Carregando…</p>
  </div>
</div>
<div class="wrap">
  <div id="hero" class="hero-card" style="display:none;">
    <div class="hero-icon-halo" id="hero-halo">
      <div class="hero-icon" id="hero-icon"></div>
    </div>
    <p class="hero-text" id="hero-text"></p>
  </div>

  <h2 class="section-title">Serviços</h2>
  <div id="list"><div class="loading">Carregando status dos sistemas…</div></div>
</div>
<div id="tooltip"></div>
<script>
const STATUS_META = {
  up:      { label: 'Operante',    cls: 'up' },
  down:    { label: 'Inoperante',  cls: 'down' },
  maint:   { label: 'Manutenção',  cls: 'maint' },
  unknown: { label: 'Desconhecido', cls: 'unknown' },
};

const POLL_INTERVAL_MS = 30000; // ~30s
const CLOCK_INTERVAL_MS = 1000; // relógio/contagem regressiva, sem rede

let serviceInfo = {};         // id -> { name, url } (config/services.json, carregado 1x)
let lastUpdatedAt = null;
let lastServiceJson = {};     // id -> JSON.stringify(service), p/ atualização parcial
let lastUpdatedAtDate = null;

function meta(status){ return STATUS_META[status] || STATUS_META.unknown; }

// Disponibilidade calculada sobre os segmentos com resultado conhecido
// (up/down/maint). "Manutenção" conta como indisponível (down) para fins
// de %, pois o serviço está de fato fora do ar para o usuário nesse
// período. "Desconhecido" continua fora da conta — não é uma medição,
// é ausência de dado.
function computeUptime(history){
  const known = history.filter(h => h.status === 'up' || h.status === 'down' || h.status === 'maint');
  if(known.length === 0) return null;
  const upCount = known.filter(h => h.status === 'up').length;
  return { pct: Math.round(upCount / known.length * 100), known: known.length };
}

function fmtDateTime(iso){
  const d = new Date(iso);
  return d.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function renderHero(current){
  const hero = document.getElementById('hero');
  const halo = document.getElementById('hero-halo');
  const icon = document.getElementById('hero-icon');
  const text = document.getElementById('hero-text');
  const hasDown = current.some(s => s === 'down');
  const hasMaint = current.some(s => s === 'maint');
  const hasUnknown = current.some(s => s === 'unknown');

  let cls, label;
  if(hasDown){ cls = 'down'; label = 'Alguns sistemas indisponíveis'; }
  else if(hasMaint){ cls = 'maint'; label = 'Alguns sistemas em manutenção'; }
  else if(hasUnknown){ cls = 'unknown'; label = 'Status de alguns sistemas desconhecido'; }
  else { cls = 'up'; label = 'Todos os sistemas operantes'; }

  halo.className = 'hero-icon-halo ' + cls;
  icon.className = 'hero-icon ' + cls;
  text.textContent = label;
  hero.style.display = 'flex';
}

function cardHtml(s){
  const last = s.history[s.history.length - 1];
  const m = meta(last.status);
  const uptime = computeUptime(s.history);
  const info = serviceInfo[s.id] || { name: s.id, url: null };
  const bars = s.history.map((h) => {
    const hm = meta(h.status);
    return `<div class="bar ${hm.cls}" data-status="${h.status}" data-checked="${h.checkedAt}"></div>`;
  }).join('');
  const uptimeHtml = uptime
    ? `${uptime.pct}%<span class="uptime-label">disponibilidade</span>`
    : `—<span class="uptime-label">sem dados suficientes</span>`;

  const nameInner = `${info.name} <span class="arrow">→</span>`;
  const nameHtml = info.url
    ? `<a class="name-link" href="${info.url}" target="_blank" rel="noopener">${nameInner}</a>`
    : `<span class="name-link">${nameInner}</span>`;

  return `
    <div class="card-top">
      <div>
        ${nameHtml}
        <div class="uptime ${m.cls}">${uptimeHtml}</div>
      </div>
      <div class="status-badge ${m.cls}" title="${m.label}">
        <span class="dot ${m.cls}"></span>
      </div>
    </div>
    <div class="history-wrap">
      <div class="history">${bars}</div>
      <div class="history-caption">Últimas 30 verificações</div>
    </div>
  `;
}

function renderListFull(services){
  const list = document.getElementById('list');
  list.innerHTML = services.map(s => `<div class="card" data-id="${s.id}">${cardHtml(s)}</div>`).join('');
  services.forEach(s => { lastServiceJson[s.id] = JSON.stringify(s); });
}

function renderListDiff(services){
  const list = document.getElementById('list');
  services.forEach(s => {
    const serialized = JSON.stringify(s);
    if(lastServiceJson[s.id] === serialized) return;

    let card = list.querySelector(`.card[data-id="${s.id}"]`);
    if(!card){
      card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = s.id;
      list.appendChild(card);
    }
    card.innerHTML = cardHtml(s);
    card.classList.add('flash');
    setTimeout(() => card.classList.remove('flash'), 900);

    lastServiceJson[s.id] = serialized;
  });
}

// --- Tooltip do histórico (funciona com mouse e com toque) ---
const tooltipEl = document.getElementById('tooltip');
let tappedBar = null;

function showTooltip(bar, x, y){
  const m = meta(bar.dataset.status);
  tooltipEl.innerHTML = `<b>${m.label}</b><br>${fmtDateTime(bar.dataset.checked)}`;
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top = y + 'px';
  tooltipEl.classList.add('visible');
}
function hideTooltip(){ tooltipEl.classList.remove('visible'); }

document.getElementById('list').addEventListener('mouseover', (e) => {
  const bar = e.target.closest('.bar');
  if(!bar) return;
  const rect = bar.getBoundingClientRect();
  showTooltip(bar, rect.left + rect.width / 2, rect.top);
});
document.getElementById('list').addEventListener('mouseout', (e) => {
  if(e.target.closest('.bar')) hideTooltip();
});
document.getElementById('list').addEventListener('click', (e) => {
  const bar = e.target.closest('.bar');
  if(!bar){ tappedBar?.classList.remove('tapped'); tappedBar = null; hideTooltip(); return; }
  if(tappedBar === bar){ bar.classList.remove('tapped'); tappedBar = null; hideTooltip(); return; }
  tappedBar?.classList.remove('tapped');
  bar.classList.add('tapped');
  tappedBar = bar;
  const rect = bar.getBoundingClientRect();
  showTooltip(bar, rect.left + rect.width / 2, rect.top);
});

function updateClock(){
  const sub = document.getElementById('sub-updated');
  if(!lastUpdatedAtDate || !sub) return;

  const diffSec = Math.max(0, Math.round((Date.now() - lastUpdatedAtDate.getTime()) / 1000));
  let when;
  if(diffSec < 5) when = 'agora mesmo';
  else if(diffSec < 60) when = `há ${diffSec} segundos`;
  else if(diffSec < 3600) when = `há ${Math.floor(diffSec / 60)} minuto(s)`;
  else when = 'há ' + lastUpdatedAtDate.toLocaleString('pt-BR');
  sub.textContent = 'Atualizado ' + when;
}

async function loadServiceInfo(){
  const res = await fetch('./config/services.json', { cache: 'no-store' });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const config = await res.json();
  config.services.forEach(s => { serviceInfo[s.id] = { name: s.name, url: s.url }; });
}

async function pollStatus(isFirstLoad){
  try{
    const res = await fetch('./data/status.json?t=' + Date.now(), { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if(!isFirstLoad && data.updatedAt === lastUpdatedAt){ updateClock(); return; }

    renderHero(data.services.map(s => s.history[s.history.length - 1].status));
    if(isFirstLoad) renderListFull(data.services);
    else renderListDiff(data.services);

    lastUpdatedAt = data.updatedAt;
    lastUpdatedAtDate = new Date(data.updatedAt);
    updateClock();
  }catch(e){
    if(isFirstLoad){
      document.getElementById('list').innerHTML =
        '<div class="error">Não foi possível carregar o status agora. Tente novamente em instantes.</div>';
    }
    console.error(e);
  }
}

async function init(){
  try{ await loadServiceInfo(); }
  catch(e){ console.error('Falha ao carregar config/services.json', e); }
  await pollStatus(true);
  setInterval(() => pollStatus(false), POLL_INTERVAL_MS);
  setInterval(updateClock, CLOCK_INTERVAL_MS);
}

init();
</script>
</body>
</html>
