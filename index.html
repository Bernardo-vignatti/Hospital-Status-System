<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status dos Sistemas — Hospital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F3F6F7; --panel: #FFFFFF; --ink: #10222B; --ink-soft: #55707A;
    --line: #E4EAEC; --teal-deep: #0A5B63;
    --up: #1F9D55; --up-bg: #E7F6ED;
    --down: #D14343; --down-bg: #FBE7E7;
    --unknown: #8996A0; --unknown-bg: #EDF0F1;
    --shadow-sm: 0 1px 2px rgba(16,34,43,0.05);
    --shadow-md: 0 10px 28px -16px rgba(16,34,43,0.22), 0 2px 6px -2px rgba(16,34,43,0.06);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ background:var(--bg); color:var(--ink); font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh; }
  .wrap{ max-width:760px; margin:0 auto; padding:0 20px 72px; }
  @media (min-width: 900px){ .wrap{ max-width:820px; padding:0 24px 88px; } }

  /* Smartphones: empilha nome/status acima de disponibilidade/latência,
     em vez de lado a lado, para nunca haver corte ou sobreposição
     quando o nome do serviço ocupa mais de uma linha. */
  @media (max-width: 480px){
    .card-top{ flex-direction:column; align-items:flex-start; gap:10px; }
    .uptime, .latency{ text-align:left; }
    h1{ font-size:26px; }
  }

  header{ padding:40px 0 26px; border-bottom:1px solid var(--line); margin-bottom:30px; }
  .eyebrow{ font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--teal-deep); margin:0 0 10px; }
  h1{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:30px; margin:0 0 6px; letter-spacing:-0.01em; }
  .sub{ color:var(--ink-soft); font-size:14.5px; margin:0; }

  .banner{ display:flex; align-items:center; gap:14px; padding:18px 22px; border-radius:12px; margin-bottom:30px; font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:16px; border:1px solid transparent; box-shadow:var(--shadow-sm); transition:background-color .3s ease, color .3s ease, border-color .3s ease; }
  .banner.up{ background:var(--up-bg); color:#146538; border-color:#BEE6CC; }
  .banner.down{ background:var(--down-bg); color:#8F2A2A; border-color:#F1BFBF; }
  .banner.unknown{ background:var(--unknown-bg); color:#4B5B63; border-color:#D7DEE1; }

  .dot{ width:11px; height:11px; border-radius:50%; display:inline-block; position:relative; flex-shrink:0; }
  .dot::after{ content:''; position:absolute; inset:-5px; border-radius:50%; opacity:0.35; }
  .dot.up{ background:var(--up); } .dot.up::after{ background:var(--up); animation:pulse 2.2s ease-out infinite; }
  .dot.down{ background:var(--down); }
  .dot.unknown{ background:var(--unknown); }
  @keyframes pulse{ 0%{ transform:scale(0.6); opacity:0.5; } 100%{ transform:scale(1.8); opacity:0; } }
  @media (prefers-reduced-motion: reduce){ .dot::after{ animation:none; display:none; } .card{ animation:none !important; } }

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:22px 22px 20px; margin-bottom:16px; box-shadow:var(--shadow-sm);
    transition:box-shadow .35s ease, border-color .35s ease, transform .35s ease;
  }
  .card.flash{ border-color:var(--teal-deep); box-shadow:0 0 0 3px rgba(10,91,99,0.12), var(--shadow-md); }
  @keyframes fadeIn{ from{ opacity:0; transform:translateY(5px); } to{ opacity:1; transform:translateY(0); } }
  .card{ animation:fadeIn .4s ease both; }

  .card-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; }
  .name{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:16.5px; margin:0 0 7px; letter-spacing:-0.005em; }
  .status-label{ font-family:'IBM Plex Mono', monospace; font-size:12px; display:inline-flex; align-items:center; }
  .status-label.up{ color:var(--up); } .status-label.down{ color:var(--down); } .status-label.unknown{ color:var(--unknown); }

  .uptime{ font-family:'IBM Plex Mono', monospace; font-size:21px; font-weight:600; text-align:right; white-space:nowrap; }
  .uptime span{ font-size:11.5px; font-weight:400; color:var(--ink-soft); display:block; margin-top:3px; white-space:normal; }
  .latency{ font-family:'IBM Plex Mono', monospace; font-size:11px; color:#9AAAB1; text-align:right; margin-top:5px; }

  .history-wrap{ margin-top:18px; padding-top:16px; border-top:1px solid var(--line); }
  .history{ display:flex; gap:2.5px; height:30px; }
  .bar{
    flex:1; border-radius:3px; min-width:3px; cursor:pointer;
    transition:background-color .3s ease, transform .15s ease;
  }
  .bar.up{ background:var(--up); } .bar.down{ background:var(--down); } .bar.unknown{ background:var(--unknown); opacity:0.55; }
  .bar:hover, .bar.tapped{ transform:scaleY(1.12); }
  .history-caption{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:#9AAAB1; margin-top:8px; }

  #tooltip{
    position:fixed; z-index:50; pointer-events:none; background:#10222B; color:#fff;
    border-radius:8px; padding:9px 12px; font-family:'IBM Plex Mono', monospace; font-size:11.5px;
    line-height:1.5; box-shadow:0 8px 24px rgba(0,0,0,0.25); opacity:0; transform:translate(-50%,-8px);
    transition:opacity .12s ease, transform .12s ease; max-width:220px; white-space:nowrap;
  }
  #tooltip.visible{ opacity:1; transform:translate(-50%,-14px); }
  #tooltip b{ font-family:'Inter', sans-serif; font-weight:600; }

  .updated-at{ text-align:center; color:#9AAAB1; font-family:'IBM Plex Mono', monospace; font-size:11px; margin-top:26px; }
  .loading, .error{ text-align:center; padding:60px 0; color:var(--ink-soft); font-family:'IBM Plex Mono', monospace; font-size:13px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">Painel de Status</p>
    <h1>Sistemas do Hospital</h1>
    <p class="sub">Acompanhamento em tempo real da infraestrutura crítica.</p>
  </header>
  <div id="banner" class="banner up" style="display:none;">
    <svg width="28" height="20" viewBox="0 0 28 20" fill="none">
      <path d="M0 10 H6 L9 2 L13 18 L16 10 H28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span id="banner-text"></span>
  </div>
  <div id="list"><div class="loading">Carregando status dos sistemas…</div></div>
  <p class="updated-at" id="updated-at"></p>
</div>
<div id="tooltip"></div>
<script>
const STATUS_META = {
  up:      { label: 'Operante',    cls: 'up' },
  down:    { label: 'Inoperante',  cls: 'down' },
  unknown: { label: 'Desconhecido', cls: 'unknown' },
};

const POLL_INTERVAL_MS = 30000; // ~30s
const CLOCK_INTERVAL_MS = 1000; // "atualizado há Xs", sem rede

let serviceNames = {};        // id -> name (config/services.json, carregado 1x)
let lastUpdatedAt = null;
let lastServiceJson = {};     // id -> JSON.stringify(service), p/ atualização parcial
let lastUpdatedAtDate = null;

function meta(status){ return STATUS_META[status] || STATUS_META.unknown; }

// Disponibilidade calculada só sobre os segmentos com resultado conhecido
// (up/down). "Desconhecido" não conta como operante nem entra no
// denominador — não é uma medição, é ausência de dado.
function computeUptime(history){
  const known = history.filter(h => h.status === 'up' || h.status === 'down');
  if(known.length === 0) return null;
  const upCount = known.filter(h => h.status === 'up').length;
  return { pct: Math.round(upCount / known.length * 100), known: known.length };
}

function fmtDateTime(iso){
  const d = new Date(iso);
  return d.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function renderBanner(current){
  const banner = document.getElementById('banner');
  const text = document.getElementById('banner-text');
  const hasDown = current.some(s => s === 'down');
  const hasUnknown = current.some(s => s === 'unknown');
  banner.classList.remove('up','down','unknown');
  banner.style.display = 'flex';
  if(hasDown){ banner.classList.add('down'); text.textContent = 'Um ou mais sistemas estão indisponíveis'; }
  else if(hasUnknown){ banner.classList.add('unknown'); text.textContent = 'Status de um ou mais sistemas está desconhecido'; }
  else { banner.classList.add('up'); text.textContent = 'Todos os sistemas operantes'; }
}

function cardHtml(s){
  const last = s.history[s.history.length - 1];
  const m = meta(last.status);
  const uptime = computeUptime(s.history);
  const name = serviceNames[s.id] || s.id;
  const latency = typeof last.responseTime === 'number'
    ? `<div class="latency">Latência: ${last.responseTime} ms</div>`
    : '';
  const bars = s.history.map((h, i) => {
    const hm = meta(h.status);
    return `<div class="bar ${hm.cls}" data-status="${h.status}" data-checked="${h.checkedAt}" data-rt="${h.responseTime ?? ''}"></div>`;
  }).join('');
  const uptimeHtml = uptime
    ? `${uptime.pct}%<span>disponibilidade</span>`
    : `—<span>sem dados suficientes</span>`;

  return `
    <div class="card-top">
      <div>
        <p class="name">${name}</p>
        <span class="status-label ${m.cls}">
          <span class="dot ${m.cls}" style="width:8px;height:8px;margin-right:6px;vertical-align:middle;"></span>${m.label}
        </span>
      </div>
      <div style="min-width:0;">
        <div class="uptime">${uptimeHtml}</div>
        ${latency}
      </div>
    </div>
    <div class="history-wrap">
      <div class="history">${bars}</div>
      <div class="history-caption">Últimos 5 minutos</div>
    </div>
  `;
}

function renderListFull(services){
  const list = document.getElementById('list');
  list.innerHTML = services.map(s => `<div class="card" data-id="${s.id}">${cardHtml(s)}</div>`).join('');
  services.forEach(s => { lastServiceJson[s.id] = JSON.stringify(s); });
}

function renderListDiff(services){
  const list = document.getElementById('list');
  services.forEach(s => {
    const serialized = JSON.stringify(s);
    if(lastServiceJson[s.id] === serialized) return;

    let card = list.querySelector(`.card[data-id="${s.id}"]`);
    if(!card){
      card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = s.id;
      list.appendChild(card);
    }
    card.innerHTML = cardHtml(s);
    card.classList.add('flash');
    setTimeout(() => card.classList.remove('flash'), 900);

    lastServiceJson[s.id] = serialized;
  });
}

// --- Tooltip do histórico (funciona com mouse e com toque) ---
const tooltipEl = document.getElementById('tooltip');
let tappedBar = null;

function showTooltip(bar, x, y){
  const m = meta(bar.dataset.status);
  const rt = bar.dataset.rt;
  tooltipEl.innerHTML = `<b>${m.label}</b><br>${fmtDateTime(bar.dataset.checked)}` +
    (rt ? `<br>Tempo de resposta: ${rt} ms` : '');
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top = y + 'px';
  tooltipEl.classList.add('visible');
}
function hideTooltip(){ tooltipEl.classList.remove('visible'); }

document.getElementById('list').addEventListener('mouseover', (e) => {
  const bar = e.target.closest('.bar');
  if(!bar) return;
  const rect = bar.getBoundingClientRect();
  showTooltip(bar, rect.left + rect.width / 2, rect.top);
});
document.getElementById('list').addEventListener('mouseout', (e) => {
  if(e.target.closest('.bar')) hideTooltip();
});
document.getElementById('list').addEventListener('click', (e) => {
  const bar = e.target.closest('.bar');
  if(!bar){ tappedBar?.classList.remove('tapped'); tappedBar = null; hideTooltip(); return; }
  if(tappedBar === bar){ bar.classList.remove('tapped'); tappedBar = null; hideTooltip(); return; }
  tappedBar?.classList.remove('tapped');
  bar.classList.add('tapped');
  tappedBar = bar;
  const rect = bar.getBoundingClientRect();
  showTooltip(bar, rect.left + rect.width / 2, rect.top);
});

function updateClock(){
  const el = document.getElementById('updated-at');
  if(!lastUpdatedAtDate || !el) return;
  const diffSec = Math.max(0, Math.round((Date.now() - lastUpdatedAtDate.getTime()) / 1000));
  let when;
  if(diffSec < 5) when = 'agora mesmo';
  else if(diffSec < 60) when = `há ${diffSec} segundos`;
  else if(diffSec < 3600) when = `há ${Math.floor(diffSec / 60)} minuto(s)`;
  else when = 'há ' + lastUpdatedAtDate.toLocaleString('pt-BR');
  el.textContent = 'Atualizado ' + when;
}

async function loadServiceNames(){
  const res = await fetch('./config/services.json', { cache: 'no-store' });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const config = await res.json();
  config.services.forEach(s => { serviceNames[s.id] = s.name; });
}

async function pollStatus(isFirstLoad){
  try{
    const res = await fetch('./data/status.json?t=' + Date.now(), { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if(!isFirstLoad && data.updatedAt === lastUpdatedAt) return;

    renderBanner(data.services.map(s => s.history[s.history.length - 1].status));
    if(isFirstLoad) renderListFull(data.services);
    else renderListDiff(data.services);

    lastUpdatedAt = data.updatedAt;
    lastUpdatedAtDate = new Date(data.updatedAt);
    updateClock();
  }catch(e){
    if(isFirstLoad){
      document.getElementById('list').innerHTML =
        '<div class="error">Não foi possível carregar o status agora. Tente novamente em instantes.</div>';
    }
    console.error(e);
  }
}

async function init(){
  try{ await loadServiceNames(); }
  catch(e){ console.error('Falha ao carregar config/services.json', e); }
  await pollStatus(true);
  setInterval(() => pollStatus(false), POLL_INTERVAL_MS);
  setInterval(updateClock, CLOCK_INTERVAL_MS);
}

init();
</script>
</body>
</html>
